<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  .register-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    background:
      linear-gradient(rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.55)),
      url('/assets/images/hero-background.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    padding: 4rem 2rem;
    box-sizing: border-box;
  }

  .register-card {
    width: 100%;
    max-width: 480px;
    padding: 40px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    z-index: 2;
  }

  .fcx-form-title {
    font-size: 1.9rem;
    font-weight: 800;
    color: #111827;
    margin-bottom: 0.35rem;
    text-align: center;
  }

  .fcx-input {
    width: 100%;
    padding: 0.82rem 1rem;
    border: 1.5px solid #d1fae5;
    border-radius: 10px;
    margin-bottom: 1rem;
    box-sizing: border-box;
    font-family: inherit;
  }

  .fcx-select {
    width: 100%;
    padding: 0.82rem 1rem;
    border: 1.5px solid #d1fae5;
    border-radius: 10px;
    margin-bottom: 1.2rem;
    box-sizing: border-box;
    background-color: white;
    font-family: inherit;
    color: #374151;
  }

  .fcx-btn {
    width: 100%;
    padding: 0.88rem 1.5rem;
    background: #16a34a;
    color: #fff;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 1rem;
    margin-top: 0.5rem;
  }

  .fcx-btn:hover {
    background: #15803d;
  }

  .fcx-btn:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  .validation-hints {
    font-size: 0.75rem;
    margin-bottom: 1rem;
    padding-left: 0.5rem;
  }

  .hint-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.2rem;
  }

  .hint-item.valid {
    color: #16a34a;
  }

  .hint-item.invalid {
    color: #9ca3af;
  }
</style>

<app-navbar></app-navbar>

<div class="register-page">
  <div class="register-card">
    <h1 class="fcx-form-title">Create Account</h1>
    <p style="color:#6b7280; margin-bottom: 2rem; text-align: center;">Join the agricultural supply chain</p>

    <form (ngSubmit)="submit()">
      <input class="fcx-input" [(ngModel)]="name" name="name" type="text" placeholder="Full Name" required />
      <input class="fcx-input" [(ngModel)]="email" name="email" type="email" placeholder="Email Address" required />

      <select class="fcx-select" [(ngModel)]="role" name="role" required>
        <option value="" disabled selected>Select your role</option>
        <option value="Farmer">Farmer</option>
        <option value="Consumer">Consumer</option>
        <option value="Distributor">Distributor</option>
        <option value="Retailer">Retailer</option>
      </select>

      <input class="fcx-input" [(ngModel)]="password" name="password" (input)="checkPassword()" type="password"
        placeholder="Password" required />

      <div class="validation-hints">
        <div class="hint-item" [class.valid]="passwordValid.minLength" [class.invalid]="!passwordValid.minLength">
          <span>●</span> At least 8 characters
        </div>
        <div class="hint-item" [class.valid]="passwordValid.uppercase" [class.invalid]="!passwordValid.uppercase">
          <span>●</span> One uppercase letter
        </div>
        <div class="hint-item" [class.valid]="passwordValid.number" [class.invalid]="!passwordValid.number">
          <span>●</span> One number
        </div>
        <div class="hint-item" [class.valid]="passwordValid.specialChar" [class.invalid]="!passwordValid.specialChar">
          <span>●</span> One special character
        </div>
      </div>

      <input class="fcx-input" [(ngModel)]="confirmPassword" name="confirmPassword" (input)="checkConfirmPassword()"
        type="password" placeholder="Confirm Password" required />
      <p *ngIf="confirmPassword && !passwordsMatch"
        style="color: #ef4444; font-size: 0.75rem; margin-top: -0.5rem; margin-bottom: 1rem; padding-left: 0.5rem;">
        Passwords do not match
      </p>

      <button type="submit" class="fcx-btn" [disabled]="!isFormValid() || submitting">
        {{ submitting ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <p style="margin-top: 2rem; text-align: center; color: #6b7280;">
      Already have an account? <a routerLink="/login"
        style="color:#16a34a; font-weight: 600; text-decoration: none;">Sign in</a>
    </p>
  </div>
</div>
