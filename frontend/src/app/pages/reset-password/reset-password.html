<div class="min-h-screen flex items-center justify-center bg-slate-900 text-white">
  <div class="bg-white/10 p-8 rounded-xl w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>

    <input type="password"
           [(ngModel)]="newPassword"
           placeholder="New Password"
           class="w-full p-3 rounded bg-black/30 mb-3">

    <input type="password"
           [(ngModel)]="confirmPassword"
           placeholder="Confirm Password"
           class="w-full p-3 rounded bg-black/30 mb-4">

    <button (click)="submit()"
            class="w-full bg-emerald-600 py-2 rounded hover:bg-emerald-700">
      {{ loading ? 'Resetting...' : 'Reset Password' }}
    </button>

    <p class="text-sm mt-4 text-center text-emerald-300">
      {{ message }}
    </p>
  </div>
</div>
