<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    background:
      linear-gradient(rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.55)),
      url('/assets/images/hero-background.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    padding: 2rem;
    box-sizing: border-box;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    padding: 40px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    z-index: 2;
  }

  .fcx-form-title {
    font-size: 1.9rem;
    font-weight: 800;
    color: #111827;
    margin-bottom: 0.35rem;
    text-align: center;
  }

  .fcx-input {
    width: 100%;
    padding: 0.82rem 1rem;
    border: 1.5px solid #d1fae5;
    border-radius: 10px;
    margin-bottom: 1rem;
    box-sizing: border-box;
  }

  .fcx-btn {
    width: 100%;
    padding: 0.88rem 1.5rem;
    background: #16a34a;
    color: #fff;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .fcx-btn:hover {
    background: #15803d;
  }
</style>

<app-navbar></app-navbar>

<div class="login-page">
  <div class="login-card">
    <h1 class="fcx-form-title">Welcome Back</h1>
    <p style="color:#6b7280; margin-bottom: 2rem; text-align: center;">Sign in to your account</p>

    <input class="fcx-input" [(ngModel)]="email" type="email" placeholder="Email Address" />
    <input class="fcx-input" [(ngModel)]="password" type="password" placeholder="Password" />

    <button class="fcx-btn" (click)="login()">Sign In</button>

    <p style="margin-top: 2rem; text-align: center; color: #6b7280;">
      New here? <a routerLink="/register" style="color:#16a34a; font-weight: 600; text-decoration: none;">Create
        account</a>
    </p>
  </div>
</div>
